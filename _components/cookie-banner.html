<!--
Cookie Consent Banner — canonical reference (Sub-sprint 0 component pattern).

This file documents the bottom-of-page cookie banner injected into every
GA-instrumented page on sgraal.com. Pages do NOT @include this file —
the block below is baked into each page before </body></html> by the
sample CTA + cookie-consent rollout.

Behaviour
=========
- First visit (no localStorage decision): banner slides in 1 second after load
- "Accept": sets sgraal_cookie_consent=accepted, banner hides, GA loads
- "Reject": sets sgraal_cookie_consent=rejected, banner hides, GA NEVER loads
- Persistence: localStorage key "sgraal_cookie_consent" (accepted | rejected)
- Re-show: footer link "Cookie preferences" calls window.sgraalCookieReshow()
  which clears the localStorage key and re-displays the banner

Companion: GA loader refactor
=============================
The canonical GA snippet (auto-load via gtag.js) is replaced site-wide with
a deferred loader exposing window.sgraalLoadGA(). The loader is called by:
  (a) the inline init script on page load, IF consent is already "accepted"
  (b) the banner's Accept button, when the user opts in for the first time
This means GA never loads for users who haven't consented OR who clicked Reject.

Visual contract
===============
- bg-white + border-t-2 border-[#c9a962] + drop-shadow
- z-50, fixed bottom-0 left-0 right-0
- Manrope headline, Inter body (Tailwind defaults already inherit)
- Buttons: equal prominence (NOT dark-pattern "Accept all")
- Mobile: stacks vertically (flex-col → md:flex-row)
- Honest copy: "Your choice — we respect both."
-->

<!-- Cookie consent banner — GDPR-compliant (sgraal.com self-compliance) -->
<div id="sgraal-cookie-banner" class="fixed bottom-0 left-0 right-0 bg-white border-t-2 border-[#c9a962] shadow-[0_-4px_20px_rgba(0,0,0,0.08)] z-50 hidden" role="dialog" aria-labelledby="sgraal-cookie-banner-title">
  <div class="max-w-6xl mx-auto px-6 py-5 flex flex-col md:flex-row md:items-center gap-4">
    <div class="flex-1">
      <p id="sgraal-cookie-banner-title" class="font-bold text-sm text-[#1a1c1a] mb-1" style="font-family: 'Manrope', sans-serif;">Cookies on sgraal.com</p>
      <p class="text-sm text-slate-600 leading-relaxed">We use cookies for analytics to improve sgraal.com. Your choice — we respect both. <a href="/privacy" class="text-[#c9a962] font-bold hover:underline">Privacy details →</a></p>
    </div>
    <div class="flex gap-3 items-stretch md:items-center flex-shrink-0">
      <button type="button" onclick="window.sgraalCookieDecide('rejected')" class="border border-[#c9a962] text-[#c9a962] px-5 py-2.5 rounded-lg font-bold text-sm hover:bg-[#c9a962]/5 transition-all">Reject</button>
      <button type="button" onclick="window.sgraalCookieDecide('accepted')" class="bg-[#c9a962] text-white px-5 py-2.5 rounded-lg font-bold text-sm hover:shadow-lg transition-all">Accept</button>
    </div>
  </div>
</div>
<script>
(function(){
  var KEY = 'sgraal_cookie_consent';
  var banner = document.getElementById('sgraal-cookie-banner');
  window.sgraalCookieDecide = function(decision) {
    try { localStorage.setItem(KEY, decision); } catch(e) {}
    if (banner) banner.classList.add('hidden');
    if (decision === 'accepted' && typeof window.sgraalLoadGA === 'function') {
      window.sgraalLoadGA();
    }
  };
  window.sgraalCookieReshow = function() {
    try { localStorage.removeItem(KEY); } catch(e) {}
    if (banner) banner.classList.remove('hidden');
  };
  var existing = null;
  try { existing = localStorage.getItem(KEY); } catch(e) {}
  if (!existing) {
    setTimeout(function(){ if (banner) banner.classList.remove('hidden'); }, 1000);
  }
})();
</script>
<!-- /Cookie consent banner -->
