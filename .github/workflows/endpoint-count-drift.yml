name: Endpoint count drift check

# Prevents the #1054-class drift where hardcoded endpoint counts in public
# HTML copy diverge from the live api.sgraal.com OpenAPI spec.
#
# Background: web-static#4 (Phase 1.5 fix-step) cleaned 366+/356/255+ →
# 355 across most pages. research#17 (Direction 2 audit) found additional
# instances. This workflow catches the next instance automatically.
#
# Mode policy:
#   - pull_request: WARN only (advisory; does not block PRs)
#   - push to main: STRICT (any drift fails the build).
#     Flipped to strict in #1067 (this file's history) after the
#     3 outstanding drifts were cleaned up in #1066 (web-static#8,
#     merged 2026-05-10T17:54:02Z).
#
# To re-allow drift temporarily (e.g. during a planned bulk
# endpoint-count change), set STRICT_MODE: "0" on the push-main
# job in a PR, merge, ship, then flip back to "1".

on:
  pull_request:
    branches: [main]
    paths:
      - '**.html'
      - 'scripts/check_endpoint_count_drift.sh'
      - '.github/workflows/endpoint-count-drift.yml'
  push:
    branches: [main]
    paths:
      - '**.html'
      - 'scripts/check_endpoint_count_drift.sh'
      - '.github/workflows/endpoint-count-drift.yml'
  workflow_dispatch:

jobs:
  check-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Drift check (advisory on PR)
    steps:
      - uses: actions/checkout@v4
      - name: Run drift check (warn-only)
        env:
          STRICT_MODE: "0"
        run: ./scripts/check_endpoint_count_drift.sh

  check-main:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    name: Drift check (main / dispatch)
    steps:
      - uses: actions/checkout@v4
      - name: Run drift check
        # STRICT mode: any drift fails the build on push to main.
        # Cleanup PR was web-static#8 (#1066, merged 2026-05-10T17:54:02Z,
        # commit 2d5d215d). The flip itself is web-static PR (#1067).
        env:
          STRICT_MODE: "1"
        run: ./scripts/check_endpoint_count_drift.sh
