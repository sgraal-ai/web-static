name: Banned strings check

# Prevents the #1054-class drift where forbidden compliance/external-validity
# claims appear on the customer-facing HTML surface.
#
# Background:
#   - #1054 audit established a manual-grep banned-strings list for 8
#     compliance-certification strings (SOC 2, MiFID2, Basel4, etc.).
#   - research#25 recommended codifying that list + adding 6 NEW Tier-1
#     strict-ban strings (Proven, certified by/to, audited by/to,
#     approved by, 100% accuracy, Guaranteed).
#   - research#26 / web-static#11 pre-cleaned the only existing "Proven"
#     heading on propagation.html:114, unblocking activation.
#
# Mode policy:
#   - pull_request: WARN only (advisory; does not block PRs)
#   - push to main: STRICT (any banned-string hit outside allowlist
#     fails the build).
#     Flipped to strict in this PR after the WARN-mode workflow
#     (post web-static#12 merge, 2026-05-11T12:51:31Z, commit
#     3bd2c7e7) confirmed 0 hits on main. Run id 25671246133.
#
# To re-allow drift temporarily (e.g. during a planned bulk
# claim-language overhaul), set STRICT_MODE: "0" on the
# push:main job in a PR, merge, ship, then flip back to "1".

on:
  pull_request:
    branches: [main]
    paths:
      - '**.html'
      - 'scripts/check_banned_strings.sh'
      - '.github/workflows/banned-strings-check.yml'
  push:
    branches: [main]
    paths:
      - '**.html'
      - 'scripts/check_banned_strings.sh'
      - '.github/workflows/banned-strings-check.yml'
  workflow_dispatch:

jobs:
  check-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Banned strings check (advisory on PR)
    steps:
      - uses: actions/checkout@v4
      - name: Run check (warn-only)
        env:
          STRICT_MODE: "0"
        run: ./scripts/check_banned_strings.sh

  check-main:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    name: Banned strings check (main / dispatch)
    steps:
      - uses: actions/checkout@v4
      - name: Run check
        # STRICT mode: any banned-string hit outside allowlist fails
        # the build on push to main. WARN-mode validation completed in
        # web-static#12 (merged 2026-05-11T12:51:31Z, commit 3bd2c7e7).
        # Post-merge workflow run 25671246133 confirmed PASS:
        # "Summary: 0 banned-string hits outside allowlist".
        env:
          STRICT_MODE: "1"
        run: ./scripts/check_banned_strings.sh
