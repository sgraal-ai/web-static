name: IP leak check

# Closes the systemic gap surfaced by 2026-04-30 vs 2026-05-16 IP audit
# delta (1 leak → 11 leaks in 17 days, per INCIDENT_PLAYBOOK §7.18 F5).
# Detects 3+ decimal-pointed numbers near IP keywords (omega, WARN, BLOCK,
# threshold, lambda, weibull, etc.) within a 5-line sliding window, with
# IP-CI-ALLOW: <reason> annotation as the explicit-exception mechanism.
#
# Scope (web-static): all *.html files recursive (root + blog/ + docs/ +
# standard/ + integrations/).
#
# Mode policy — Step 2 of 2 (2026-05-19, both jobs now STRICT):
#   - pull_request: STRICT (was WARN under Step 1; flipped 2026-05-19)
#   - push:main: STRICT (unchanged from Step 1)
#   - workflow_dispatch: STRICT (manual full scan)
#   Step 1 (WARN on PR) ran cleanly from 2026-05-16. Step 2 flip
#   executed after the 3-day soak window, mirroring the cadence of
#   banned-strings Step 1 → 2, module-count Step 1 → 2, test-count
#   Step 1 → 2.
#
# Canonical script: sgraal-ai/core/scripts/check_ip_leak.py. This file
# is a duplicate; sync when canonical updates.

on:
  pull_request:
    branches: [main]
    paths:
      - '**.html'
      - 'scripts/check_ip_leak.py'
      - '.github/workflows/ip-leak-check.yml'
  push:
    branches: [main]
    paths:
      - '**.html'
      - 'scripts/check_ip_leak.py'
      - '.github/workflows/ip-leak-check.yml'
  workflow_dispatch:

jobs:
  check-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: IP leak check (STRICT on PR — Step 2)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run IP leak check (STRICT mode, diff-only)
        env:
          STRICT_MODE: "1"
          IP_CI_REPO: web-static
        run: python3 scripts/check_ip_leak.py --diff-only

  check-main:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    name: IP leak check (main / dispatch — STRICT)
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run IP leak check (STRICT, full scan)
        env:
          STRICT_MODE: "1"
          IP_CI_REPO: web-static
        run: python3 scripts/check_ip_leak.py
